trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

stages:
  - stage: Test
    jobs:
      - job: test
        strategy:
          matrix:
            # chromium:
            #   browser: chromium
            firefox:
              browser: firefox
            # webkit:
            #   browser: webkit
          maxParallel: 1
        continueOnError: true        # equivalent to fail-fast: false
        pool:
          name: Linux-ap-pw
        steps:
          - checkout: self
          - script: |
              sudo apt update
              sudo apt install -y python3.12-venv python3-pip
              python3 -m venv .venv
              source .venv/bin/activate
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              python -m playwright install $(browser)
            displayName: Install dependencies
          
          - script: |
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
                libgtk-3-0t64 libnotify4 libnss3 libxss1 libasound2t64 \
                libgbm1 libxshmfence1
            displayName: Install browser system dependencies

          - script: |
              source .venv/bin/activate
              pytest tests/test_login.py --browser $(browser) --alluredir=allure-results
            env:
              ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
              PLAYWRIGHT_CHROMIUM_LAUNCH_OPTIONS: '{"args": ["--no-sandbox", "--disable-dev-shm-usage", "--disable-gpu"]}'
            displayName: Run tests

          - task: PublishPipelineArtifact@1
            condition: always()      # equivalent to if: always()
            inputs:
              targetPath: allure-results
              artifact: allure-results-$(browser)
            displayName: Upload Allure results

  - stage: Report
    dependsOn: Test                  # equivalent to needs: test
    condition: always()
    jobs:
      - job: report
        pool:
          name: Linux-ap-pw
        steps:
          - checkout: self

          - task: DownloadPipelineArtifact@2
            inputs:
              path: downloaded
            displayName: Download all Allure results

          - script: |
              mkdir -p allure-results
              find downloaded/ -type f -exec cp {} allure-results/ \;
              ls allure-results/
            displayName: Flatten results

          - script: |
              sudo apt-get update -y
              sudo apt-get install -y openjdk-17-jre
              java -version
            displayName: Install Java 17


          - script: |
              set -e
          
              echo "Installing dependencies..."
              sudo apt update
              sudo apt install -y curl unzip
          
              echo "Downloading Allure..."
              curl -L -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          
              echo "Extracting..."
              tar -zxvf allure.tgz
          
              echo "Cleaning old install (if exists)..."
              sudo rm -rf /opt/allure || true
              sudo rm -f /usr/local/bin/allure || true
          
              echo "Installing Allure..."
              sudo mv allure-2.27.0 /opt/allure
              sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          
              echo "Verify install..."
              allure --version
            displayName: Install Allure CLI

          - script: allure generate allure-results --clean -o allure-report
            displayName: Generate Allure report

          - task: PublishPipelineArtifact@3
            inputs:
              testResultsDir: '$(System.DefaultWorkingDirectory)/allure-report'
              reportName: "Report 1"
            displayName: Publish Allure report
